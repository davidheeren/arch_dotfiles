
source = ~/.config/hypr/hyprlock/colors.conf

$font = Iosevka Nerd Font

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
	path = ~/pictures/wallpaper/current.local
    # blur_passes = 3
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.25) # no fill

    outer_color = rgb($white)
    check_color = rgb($yellow)
    fail_color = rgb($red)

    font_color = rgb($white)
    fade_on_empty = false
    rounding = 8

    font_family = $font
    placeholder_text = Input password...
    # fail_text = $PAMFAIL

    # uncomment to use a letter instead of a dot to indicate the typed password
    # dots_text_format = *
    # dots_size = 0.4
    dots_spacing = 0.3

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 0, -20
    halign = center
    valign = center
}

# TIME
label {
    # monitor =
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    font_size = 90
    font_family = $font

    position = 25, -15
    halign = left
    valign = top

    color = rgb($white)
}

# DATE
label {
    # monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
    font_size = 25
    font_family = $font

    position = 25, -150
    halign = left
    valign = top

    color = rgb($white)
}
