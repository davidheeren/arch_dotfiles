[config]

[templates.hyprland]
input_path = '~/.config/hypr/hyprland/colors_template.lua'
output_path = '~/.config/hypr/hyprland/colors.lua'

[templates.hyprlock]
input_path = '~/.config/hypr/hyprlock/colors_template.conf'
output_path = '~/.config/hypr/hyprlock/colors.conf'

[templates.waybar]
input_path = '~/.config/waybar/style_template.css'
output_path = '~/.config/waybar/style.css'
post_hook = 'pkill -SIGUSR2 waybar'

[templates.kitty]
input_path = '~/.config/kitty/colors_template.conf'
output_path = '~/.config/kitty/colors.conf'
post_hook = 'pkill -SIGUSR1 kitty'

[templates.wofi]
input_path = '~/.config/wofi/style_template.css'
output_path = '~/.config/wofi/style.css'

[templates.dunst]
input_path = '~/.config/dunst/dunstrc_template'
output_path = '~/.config/dunst/dunstrc'
post_hook = 'dunstctl reload'

[templates.nvim]
input_path = '~/.config/nvim/lua/colorscheme/colors_template.lua'
output_path = '~/.config/nvim/lua/colorscheme/colors.lua'

[templates.zen]
input_path = '~/.config/zen_custom/userChrome_template.css'
output_path = '~/.config/zen_custom/userChrome.css'

[templates.gtk2]
input_path = '~/.themes/FlatColor/colors2_template.css'
output_path = '~/.themes/FlatColor/colors2'

[templates.gtk3]
input_path = '~/.themes/FlatColor/colors3_template.css'
output_path = '~/.themes/FlatColor/colors3'
